<style>
:root{
  --gold:#FFD700;--gold2:#FFA500;--dark:#0a0a18;--panel:#13132a;
  --border:rgba(255,215,0,0.2);--muted:rgba(255,255,255,0.45);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--dark);font-family:"Nunito",sans-serif;color:#fff;overflow:hidden;}
.stars{position:fixed;inset:0;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite;opacity:0;}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.8);}50%{opacity:var(--o,.6);transform:scale(1.2);}}
@keyframes goldShimmer{0%{background-position:200% center;}100%{background-position:-200% center;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}

/* LOCK */
#lock{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#0a0a18 0%,#0d0d2e 50%,#0a0a18 100%);transition:opacity .5s,transform .5s;padding:20px;}
#lock.unlocking{opacity:0;transform:scale(1.06);pointer-events:none;}
.lock-logo{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  margin-bottom:10px;position:relative;background:radial-gradient(circle at 40% 35%,rgba(255,215,0,.12),transparent 65%);}
.lock-logo::before{content:'';position:absolute;inset:-2px;border-radius:50%;
  background:conic-gradient(from 0deg,var(--gold),var(--gold2),transparent 50%,var(--gold));
  animation:spin 4s linear infinite;
  -webkit-mask:radial-gradient(farthest-side,#0000 calc(100% - 2px),#000 0);
  mask:radial-gradient(farthest-side,#0000 calc(100% - 2px),#000 0);}
.lock-logo img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.lock-title{font-family:"Bebas Neue",Impact,sans-serif;font-size:34px;letter-spacing:7px;
  background:linear-gradient(90deg,#b8860b,#FFD700,#fff8a0,#FFD700,#b8860b);background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:goldShimmer 3s linear infinite;margin-bottom:4px;}
.lock-sub{font-size:9px;font-weight:800;letter-spacing:3px;color:var(--muted);margin-bottom:32px;}
.pin-dots{display:flex;gap:14px;margin-bottom:28px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,215,0,.35);background:transparent;transition:all .15s;}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);box-shadow:0 0 10px rgba(255,215,0,.5);}
.pin-dot.error{background:#ff4444;border-color:#ff4444;animation:shake .35s ease;}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:240px;}
.key{height:62px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:#fff;font-family:"Bebas Neue",Impact,sans-serif;font-size:26px;letter-spacing:2px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;user-select:none;}
.key:active,.key.pressed{background:rgba(255,215,0,.18);border-color:rgba(255,215,0,.6);transform:scale(.93);}
.key.del{font-size:20px;color:var(--muted);}
.key.empty{background:transparent;border:none;cursor:default;}
.lock-hint{margin-top:22px;font-size:9px;font-weight:800;color:rgba(255,255,255,.18);letter-spacing:2px;text-transform:uppercase;}

/* HUB */
#hub{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;align-items:center;
  overflow-y:auto;padding:30px 20px 50px;
  background:linear-gradient(160deg,#0a0a18 0%,#0d0d2e 60%,#0a0a18 100%);}
#hub.visible{display:flex;}
.hub-logo{width:90px;height:90px;margin-bottom:6px;border-radius:50%;overflow:hidden;object-fit:contain;filter:drop-shadow(0 0 18px rgba(255,215,0,.3));}
.hub-title{font-family:"Bebas Neue",Impact,sans-serif;font-size:26px;letter-spacing:6px;
  background:linear-gradient(90deg,#b8860b,#FFD700,#fff8a0,#FFD700,#b8860b);background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:goldShimmer 3s linear infinite;}
.hub-sub{font-size:9px;font-weight:800;letter-spacing:3px;color:var(--muted);margin-bottom:28px;}
.cards{width:100%;max-width:400px;display:flex;flex-direction:column;gap:14px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:20px 22px;
  cursor:pointer;text-decoration:none;color:#fff;display:flex;align-items:center;gap:16px;
  transition:all .2s;position:relative;overflow:hidden;}
.card:active{transform:scale(.98);border-color:var(--gold);background:rgba(255,215,0,.05);}
.card-icon{font-size:32px;flex-shrink:0;width:58px;height:58px;background:rgba(255,215,0,.07);
  border:1px solid rgba(255,215,0,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;}
.card-body{flex:1;min-width:0;}
.card-title{font-family:"Bebas Neue",Impact,sans-serif;font-size:19px;letter-spacing:3px;color:var(--gold);}
.card-desc{font-size:11px;font-weight:700;color:var(--muted);margin-top:3px;line-height:1.5;}
.card-arrow{color:rgba(255,215,0,.4);font-size:20px;flex-shrink:0;}
.hub-footer{margin-top:28px;width:100%;max-width:400px;border-top:1px solid rgba(255,255,255,.06);padding-top:20px;}
.hub-footer-title{font-family:"Bebas Neue",Impact,sans-serif;font-size:11px;letter-spacing:3px;color:var(--muted);margin-bottom:12px;}
.settings-row{background:var(--panel);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:14px 16px;margin-bottom:8px;}
.settings-label{font-size:9px;font-weight:800;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:block;}
.pin-change-row{display:flex;gap:8px;align-items:center;}
.pin-input{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  border-radius:7px;padding:9px 10px;color:#fff;font-size:13px;font-weight:800;
  font-family:"Nunito",sans-serif;outline:none;letter-spacing:4px;min-width:0;}
.pin-input:focus{border-color:rgba(255,215,0,.5);}
.pin-save-btn{background:var(--gold);color:#000;border:none;padding:9px 14px;border-radius:7px;
  font-weight:900;font-size:11px;cursor:pointer;font-family:"Nunito",sans-serif;white-space:nowrap;flex-shrink:0;}
.pin-msg{font-size:10px;font-weight:800;margin-top:6px;min-height:14px;}
.pin-msg.ok{color:#4dff91;} .pin-msg.err{color:#ff6b6b;}
.lock-btn{width:100%;background:rgba(255,80,80,.08);border:1px solid rgba(255,80,80,.2);
  color:rgba(255,120,120,.7);border-radius:10px;padding:13px;font-weight:800;font-size:12px;
  cursor:pointer;font-family:"Nunito",sans-serif;letter-spacing:1px;margin-top:4px;}
.lock-btn:active{background:rgba(255,80,80,.18);}
</style>

</head>
<body>

<script>
(function(){
  var stars = document.getElementById('stars');
  for(var i=0;i<80;i++){
    var s=document.createElement('div');
    s.className='star';
    var sz=Math.random()*2.5+0.5;
    s.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;--d:'+(2+Math.random()*4)+'s;--o:'+(0.2+Math.random()*0.7)+';animation-delay:'+(Math.random()*5)+'s;';
    stars.appendChild(s);
  }
})();

var DEFAULT_PIN='123456';
var currentEntry='';

function getPin(){ return localStorage.getItem('casc_hub_pin')||DEFAULT_PIN; }

function updateDots(){
  var pin=getPin();
  var container=document.getElementById('pin-dots');
  var dots=container.querySelectorAll('.pin-dot');
  dots.forEach(function(d,i){
    d.classList.toggle('filled',i<currentEntry.length);
    d.classList.remove('error');
    d.style.display=i<pin.length?'':'none';
  });
}

function pressKey(k){
  if(currentEntry.length>=getPin().length) return;
  currentEntry+=k;
  updateDots();
  if(currentEntry.length===getPin().length){ setTimeout(checkPin,120); }
}

function delKey(){
  currentEntry=currentEntry.slice(0,-1);
  updateDots();
}

function checkPin(){
  if(currentEntry===getPin()){
    var lock=document.getElementById('lock');
    lock.classList.add('unlocking');
    setTimeout(function(){
      lock.style.display='none';
      document.getElementById('hub').classList.add('visible');
    },500);
  } else {
    var dots=document.querySelectorAll('.pin-dot');
    dots.forEach(function(d){ d.classList.add('error'); d.classList.remove('filled'); });
    setTimeout(function(){
      dots.forEach(function(d){ d.classList.remove('error'); });
      currentEntry='';
      updateDots();
    },650);
  }
}

function lockHub(){
  document.getElementById('hub').classList.remove('visible');
  var lock=document.getElementById('lock');
  lock.style.display='flex';
  lock.classList.remove('unlocking');
  currentEntry='';
  updateDots();
}

function savePin(){
  var np=document.getElementById('new-pin').value.trim();
  var cp=document.getElementById('confirm-pin').value.trim();
  var msg=document.getElementById('pin-msg');
  if(np.length<4){ msg.className='pin-msg err'; msg.textContent='PIN must be at least 4 digits.'; return; }
  if(!/^\d+$/.test(np)){ msg.className='pin-msg err'; msg.textContent='Numbers only.'; return; }
  if(np!==cp){ msg.className='pin-msg err'; msg.textContent="PINs don\'t match."; return; }
  localStorage.setItem('casc_hub_pin',np);
  msg.className='pin-msg ok'; msg.textContent='PIN updated!';
  document.getElementById('new-pin').value='';
  document.getElementById('confirm-pin').value='';
  updateDots();
  setTimeout(function(){ msg.textContent=''; },3000);
}

updateDots();
</script>
